name: Validate k8s YAML manifests

on:
  push:
    branches:
      - main

jobs:
  validate-yaml:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate each YAML manifest
        run: |
          cd $GITHUB_WORKSPACE
          for manifest in $(find deployments -name "*.yml"); do
            echo "Checking $manifest..."
            kubeconform -strict -summary "$manifest"
          done
